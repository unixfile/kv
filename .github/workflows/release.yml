name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          # full history and tags, so the toolchain stamps the tag
          # into the binary and kv -v reports it
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: make test

      - name: Build
        run: |
          for os in linux darwin windows; do
            for arch in amd64 arm64; do
              ext=
              if [ $os = windows ]; then ext=.exe; fi
              CGO_ENABLED=0 GOOS=$os GOARCH=$arch \
                go build -trimpath -ldflags='-s -w' \
                -o kv-$os-$arch$ext ./cmd/kv
            done
          done

      - name: Publish release
        if: ${{ !env.ACT }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" kv-* --title "$GITHUB_REF_NAME" --generate-notes
